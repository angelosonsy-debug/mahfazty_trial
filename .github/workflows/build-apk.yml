name: Build Mahfazty Trial APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Generate base Flutter/Android project skeleton
        # ده بيولد كل ملفات الـ Gradle/Android الأساسية اللي محتاجينها
        # (احنا مش بنكتبها يدوي، Flutter بيولدها لوحده)
        run: flutter create --platforms=android --org com.mahfazty --project-name trial temp_app

      - name: Overlay our custom source files on top of the skeleton
        run: |
          cp lib/main.dart temp_app/lib/main.dart
          cp android_overrides/AndroidManifest.xml temp_app/android/app/src/main/AndroidManifest.xml
          cp android_overrides/kotlin/MainActivity.kt temp_app/android/app/src/main/kotlin/com/mahfazty/trial/MainActivity.kt
          cp android_overrides/kotlin/MahfaztyNotificationListener.kt temp_app/android/app/src/main/kotlin/com/mahfazty/trial/MahfaztyNotificationListener.kt

      - name: Add intl dependency (used for time formatting)
        working-directory: temp_app
        run: flutter pub add intl

      - name: Get packages
        working-directory: temp_app
        run: flutter pub get

      - name: Build release APK
        working-directory: temp_app
        run: flutter build apk --release

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: mahfazty-trial-apk
          path: temp_app/build/app/outputs/flutter-apk/app-release.apk
